<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <title>to-do list</title>
</head>
<body class="bg-gray-200 p-2 sm:p-4 dark:bg-slate-950 transition-colors duration-200 min-h-screen flex flex-col justify-start">

   <!-- RESPONSIVE GRID CONFIGURATION: Stacks elements on mobile, side-by-side grid on desktop -->
   <div class="grid grid-cols-1 md:grid-cols-[200px_1fr] gap-3 w-full max-w-7xl mx-auto auto-rows-auto"> 

       <!-- NAVBAR SECTION (Full width across all screen form-factors) -->
       <div class="md:col-span-2 bg-[#efe2d0] dark:bg-slate-800 p-4 rounded-lg flex justify-between items-center transition-colors duration-200 shadow-sm"> 
         
         <!-- LOGO & BRANDING ZONE -->
         <div class="flex items-center gap-2">
           <img src="/TODO/Logo/calender.svg" alt="Task Logo" class="h-8 w-auto dark:block dark:invert">
           <span class="font-bold text-gray-700 dark:text-slate-200 font-sans tracking-wide text-lg">TaskTracker</span>
         </div>

         <!-- THE THEME SWITCHER -->
         <div> 
           <button id="toggle-theme" class="focus:outline-none p-1 rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors duration-200 flex items-center gap-1" aria-label="Toggle Theme">
             <img src="/TODO/Logo/dark.svg" alt="Switch to Dark Mode" class="h-7 w-auto dark:hidden">
             <img src="/TODO/Logo/light.svg" alt="Switch to Light Mode" class="h-7 w-auto hidden dark:block dark:invert">
             <p class="font-bold text-xs sm:text-sm"> 
               <span class="text-slate-700 dark:hidden">dark</span>
               <span class="text-white hidden dark:inline">light</span>
             </p>
           </button>
         </div>
       </div> 
  
       <!-- SIDEBAR SECTION: Horizontal strip on mobile/tablet, native left panel on desktop screens -->
       <div class="bg-[#efe2d0] p-4 rounded-lg md:min-h-[700px] dark:bg-slate-800 transition-colors duration-200 shadow-sm">
         <p class="font-bold text-gray-700 dark:text-slate-200 flex items-center gap-2">
           <img src="/TODO/Logo/menu.svg" alt="Menu Icon" class="dark:invert">
           <span>Sidebar</span>
         </p>
       </div>
    
       <!-- MAIN TODO AREA SECTION: Fluid layout adapts dynamically across viewports -->
       <div class="w-full min-h-[500px] md:h-[700px] bg-white flex flex-col p-4 sm:p-6 md:p-8 relative overflow-y-auto font-serif rounded-lg shadow-sm dark:bg-slate-900 transition-colors duration-200">
          <h2 class="text-xl sm:text-2xl font-bold text-center text-rose-600 dark:text-rose-400 tracking-wider">TO-DO LIST</h2> 
        
          <!-- Input Area Wrapper: Swaps to a layout stack if space becomes dangerously thin -->
          <div class="flex flex-col sm:flex-row justify-center items-stretch sm:items-center gap-2 mt-4 sticky top-0 bg-white dark:bg-slate-900 py-2 z-10">
            <input type="text" placeholder="Add to Chores" class="border border-gray-300 p-2 rounded-lg w-full max-w-xl dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:outline-none focus:border-rose-500" id="input">
            <button class="p-2 px-6 bg-green-500 rounded-lg text-[#ffffff] font-bold hover:bg-green-600 transition active:scale-95 whitespace-nowrap" id="btn">Add</button>
          </div>
      
          <div class="mt-6 flex-grow">
            <p class="text-center" id="ErrorPara"></p>
            <ul id="paras" class="dark:text-slate-300 divide-y divide-gray-100 dark:divide-slate-800"></ul>
          </div>
       </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
