<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FIXED: Removed the duplicate tailwindcss.com script which was causing configuration conflicts -->
  <script>
    tailwind.config = {
      darkMode: 'class', // Enables manual class toggling
    }
  </script>
  <title>to-do list</title>
</head>
<!-- <body class="bg-gray-200 p-2 sm:p-4 dark:bg-slate-950 transition-colors duration-200 min-h-screen"> -->
  <body class="bg-slate-50 p-2 sm:p-4 dark:bg-slate-950 transition-colors duration-200 min-h-screen">


  <!-- TAILWIND RESPONSIVE GRID: Stacked rows on mobile/tablet, 2-columns on desktop (lg:) -->
   <div class="grid grid-cols-1 lg:grid-cols-[200px_1fr] w-full max-w-7xl mx-auto shadow-[0_8px_30px_rgb(0,0,0,0.06)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.3)]
 rounded-lg"> 

       <!-- NAVBAR: Full width on all screen sizes -->
       <div class="lg:col-span-2 bg-[#efe2d0] dark:bg-slate-800 p-4 rounded-lg flex justify-between items-center transition-colors duration-200"> 
         
         <!-- LOGO & BRANDING ZONE -->
         <div class="flex items-center gap-2">
           <!-- Shows on light theme, hides on dark theme -->
           <img src="calender.svg" alt="Task Logo" class="h-8 w-auto dark:block dark:invert">
           
           <span class="font-bold text-gray-700 dark:text-slate-200 font-sans tracking-wide text-lg">TaskTracker</span>
         </div>

         <div> 
           <!-- THE LOGO BUTTON (Acts as your light/dark theme switch) -->
         <button id="toggle-theme" class="focus:outline-none p-1 rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors duration-200 flex items-center gap-2" aria-label="Toggle Theme">
           <!-- Shows on light theme, hides on dark theme -->
           <img src="dark.svg" alt="Switch to Dark Mode" class="h-9 w-auto dark:hidden">
           <!-- Hides on light theme, shows on dark theme -->
           <img src="light.svg" alt="Switch to Light Mode" class="h-9 w-auto hidden dark:block dark:invert">
          <p class="font-bold text-sm hidden sm:block"> <span class="text-slate-700 dark:text-slate-400">dark</span>/<span class="text-neutral-500 dark:text-white">light</span></p>
         </button>
         </div>
       </div> 
                <!-- SIDEBAR: Fixed to layout horizontally on mobile, vertically on desktop -->
        <div class="w-full lg:w-[200px] bg-[#efe2d0] p-4 rounded-lg dark:bg-slate-800 transition-colors duration-200">
            <div class="flex lg:flex-col justify-between items-center lg:items-start gap-4">
                <button id="menuToggleBtn" class="lg:hidden">
                    <img src="menu.svg" alt="Menu" class="dark:invert">
                </button>
                <ul class="flex lg:flex-col gap-2 sm:gap-4 font-sans text-sm font-semibold text-gray-600 dark:text-slate-300 w-full" id="hidden">
                    <li id="filter-all" class="flex items-center gap-2 p-2 rounded-md cursor-pointer hover:bg-white/40 dark:hover:bg-white/10 text-rose-600 dark:text-rose-400 whitespace-nowrap">
                        <span class="font-bold">📝 All Tasks</span>
                    </li>
                    <li id="filter-active" class="flex items-center gap-2 p-2 rounded-md cursor-pointer hover:bg-white/40 dark:hover:bg-white/10 whitespace-nowrap">
                        <span class="font-bold">⏳ Active</span>
                    </li>
                    <li id="filter-completed" class="flex items-center gap-2 p-2 rounded-md cursor-pointer hover:bg-white/40 dark:hover:bg-white/10 whitespace-nowrap">
                        <span class="font-bold">✅ Completed</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- MAIN TODO AREA: Displays cleanly underneath the sidebar on mobile -->
        <div class="w-full min-h-[500px] max-lg:h-[calc(100vh)] lg:h-[800px] bg-white flex flex-col p-4 sm:p-8 relative overflow-auto font-serif rounded-lg shadow dark:bg-slate-900 transition-colors duration-200">
            <h2 class="text-2xl font-bold text-center text-[#b14a43] dark: dark:text-slate-100">TO-DO LIST</h2>
            
            <!-- Input Area Wrapper -->
            <div class="flex flex-col sm:flex-row justify-center mt-4 gap-2 sticky top-0 bg-white dark:bg-slate-900 py-2 z-10">
                <input type="text" placeholder="Add to Chores" class="border border-gray-300 p-2 rounded-lg max-lg:w-auto w-[600px] dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:outline-none focus:border-rose-500" id="input">
                <button class="p-2 px-6 bg-[#b14a43] text-white font-bold rounded-lg hover:bg-[#963b35] transition-colors duration-200 w-full sm:w-auto shadow-sm"
                id="btn">Add</button>
            </div>

            <!--ERROR SECTION-->
            <div class="mt-6">
                <p class="text-center font-bold text-2xl text-gray-500" id="ErrorPara"></p>
                <ul id="paras" class="dark:text-white"></ul>
            </div>
        </div>


  <script src="script.js"></script>
</body>
</html>
