<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FIXED: Removed the duplicate tailwindcss.com script which was causing configuration conflicts -->
  <script>
    tailwind.config = {
      darkMode: 'class', // Enables manual class toggling
    }
  </script>
  <title>to-do list</title>
</head>
<body class="bg-gray-200 p-2 sm:p-4 dark:bg-slate-950 transition-colors duration-200 min-h-screen">

  <!-- TAILWIND RESPONSIVE GRID: Stacked rows on mobile/tablet, 2-columns on desktop (lg:) -->
   <div class="grid grid-cols-1 lg:grid-cols-[200px_1fr] gap-2 w-full max-w-7xl mx-auto"> 

       <!-- NAVBAR: Full width on all screen sizes -->
       <div class="lg:col-span-2 bg-[#efe2d0] dark:bg-slate-800 p-4 rounded-lg flex justify-between items-center transition-colors duration-200"> 
         
         <!-- LOGO & BRANDING ZONE -->
         <div class="flex items-center gap-2">
           <!-- Shows on light theme, hides on dark theme -->
           <img src="/TODO/Logo/calender.svg" alt="Task Logo" class="h-8 w-auto dark:block dark:invert">
           
           <span class="font-bold text-gray-700 dark:text-slate-200 font-sans tracking-wide text-lg">TaskTracker</span>
         </div>

         <div> 
           <!-- THE LOGO BUTTON (Acts as your light/dark theme switch) -->
         <button id="toggle-theme" class="focus:outline-none p-1 rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors duration-200 flex items-center gap-2" aria-label="Toggle Theme">
           <!-- Shows on light theme, hides on dark theme -->
           <img src="/TODO/Logo/dark.svg" alt="Switch to Dark Mode" class="h-9 w-auto dark:hidden">
           <!-- Hides on light theme, shows on dark theme -->
           <img src="/TODO/Logo/light.svg" alt="Switch to Light Mode" class="h-9 w-auto hidden dark:block dark:invert">
          <p class="font-bold text-sm hidden sm:block"> <span class="text-slate-700 dark:text-slate-400">dark</span>/<span class="text-neutral-500 dark:text-white">light</span></p>
         </button>
         </div>
       </div> 
  
       <!-- SIDEBAR: Completely hidden on mobile/tablet (hidden), displays normally on desktop (lg:block) -->
       <div class="hidden lg:block bg-[#efe2d0] w-[200px] p-4 rounded-lg min-h-[600px] lg:min-h-[800px] dark:bg-slate-800 transition-colors duration-200">
         <p class="font-bold text-gray-700 dark:text-slate-200 flex items-center gap-2">
          <img src="/TODO/Logo/menu.svg" alt="" class="dark:invert">
          sidebar</p>
       </div>
    
       <!-- MAIN TODO AREA: Full screen width on mobile, scales nicely on layout changes -->
       <div class="w-full min-h-[600px] lg:h-[800px] bg-white flex flex-col p-4 sm:p-8 relative overflow-auto font-serif rounded-lg shadow dark:bg-slate-900 transition-colors duration-200">
          <h2 class="text-2xl font-bold text-center text-rose-600 dark:text-rose-400">TO-DO LIST</h2> 
        
          <!-- Input Area Wrapper: Vertically stacked on mobile viewports, side-by-side row elements on screens above sm -->
          <div class="flex flex-col sm:flex-row justify-center mt-4 gap-2 sticky top-[0px] bg-white dark:bg-slate-900 py-2 z-10">
            <input type="text" placeholder="Add to Chores" class="border border-gray-300 p-2 rounded-lg w-full max-w-xl dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:outline-none focus:border-rose-500" id="input">
            <button class="p-2 px-6 bg-green-500 rounded-lg text-[#ffffff] font-bold hover:bg-green-600 transition w-full sm:w-auto" id="btn">Add</button>
          </div>
      <!--ERROR SECTION-->
          <div class="mt-6">
            <p class="text-center" id="ErrorPara"></p>
            <ul id="paras" class="dark:text-slate-300"></ul>
          </div>
       </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
